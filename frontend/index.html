<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Advanced phishing URL detector powered by machine learning. Check if a URL is safe or suspicious.">
  <title>Phishing URL Detector - ML-Powered Security</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header role="banner">
      <div class="header-top">
        <h1>Phishing URL Detector</h1>
        <a href="history.html" class="nav-link" aria-label="View URL check history">View History</a>
      </div>
      <p>Advanced ML-powered detection. Paste a URL and check whether it's suspicious or safe.</p>
    </header>

    <main role="main">
      <form id="url-form" class="card" autocomplete="off">
        <label for="url-input">Enter a URL to analyze</label>
        <div class="input-group">
          <input 
            id="url-input" 
            type="text" 
            placeholder="https://example.com/login" 
            aria-label="URL input field"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="check-button" type="submit" aria-label="Check URL for phishing">Check URL</button>
        </div>
        <div id="error-message" class="message error hidden" role="alert" aria-live="polite" aria-atomic="true"></div>
      </form>

      <section id="result-card" class="card hidden" role="region" aria-label="Analysis results" aria-live="polite">
        <div class="result-header">
          <h2 id="result-status">Result</h2>
          <div id="risk-badge" class="badge" aria-label="Risk assessment">Analyzing...</div>
        </div>
        <div class="progress-shell">
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <span id="progress-label" aria-label="Risk percentage">0%</span>
        </div>
        <div id="result-text" class="result-text"></div>
        <div id="reason-list" class="reason-list" role="list"></div>
      </section>

    </main>
  </div>

  <div id="spinner" class="spinner hidden" aria-hidden="true" role="status">
    <span class="sr-only">Analyzing URL...</span>
  </div>
  
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
  
  <script src="script.js"></script>
</body>
</html>
